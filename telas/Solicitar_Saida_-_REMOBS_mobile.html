    body {
      min-height: max(884px, 100dvh);

  </head>
<body class="bg-background text-on-surface min-h-screen pb-32">
<!-- Header Navigation -->
<header class="fixed top-0 w-full z-50 bg-surface shadow-sm px-4 h-16 flex items-center gap-4">
<button class="active:scale-95 transition-transform duration-150 p-2 -ml-2">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary">Solicitar Saída</h1>
</header>
<main class="pt-20 px-4">
<!-- Step Indicator -->
<nav class="flex items-center justify-between mb-8 bg-surface-container-low rounded-xl p-2">
<div class="flex-1 flex items-center justify-center gap-2 py-2 px-3 bg-primary text-on-primary rounded-lg transition-all">
<span class="font-label-lg text-label-lg">1. Selecionar Itens</span>
</div>
<div class="flex-1 flex items-center justify-center gap-2 py-2 px-3 text-on-surface-variant">
<span class="font-label-lg text-label-lg">2. Detalhes</span>
</div>
</nav>
<!-- Form Section -->
<div class="space-y-6">
<!-- Search Item -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Buscar Item</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface-container-low border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md" placeholder="Nome do item ou SKU" type="text"/>
</div>
</div>
<!-- Quantity & Source Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Quantidade</label>
<input class="w-full h-12 px-4 bg-surface-container-low border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md" placeholder="0" type="number"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Origem</label>
<div class="relative">
<select class="w-full h-12 px-4 bg-surface-container-low border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md appearance-none">
<option value="">Selecionar</option>
<option value="A1">Almoxarifado A1</option>
<option value="B2">Galpão B2</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Destination -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Destino</label>
<div class="relative">
<select class="w-full h-12 px-4 bg-surface-container-low border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md appearance-none">
<option value="">Selecionar destino</option>
<option value="D1">Docas Norte</option>
<option value="D2">Área de Manutenção</option>
<option value="D3">Cliente Direto</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Reason -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Motivo da Saída</label>
<textarea class="w-full p-4 bg-surface-container-low border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md resize-none" placeholder="Descreva o motivo desta solicitação..." rows="3"></textarea>
</div>
<!-- Evidence Toggle -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant">photo_camera</span>
<span class="font-body-md text-body-md text-on-surface">Anexar evidência fotográfica</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" id="evidence-toggle" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Conditional Photo Upload Placeholder (JS triggered) -->
<div class="hidden animate-in fade-in slide-in-from-top-4 duration-300" id="photo-upload-area">
<div class="w-full aspect-video rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-2 bg-surface-container-low">
<span class="material-symbols-outlined text-outline text-4xl">add_a_photo</span>
<p class="font-label-md text-label-md text-on-surface-variant">Toque para capturar imagem</p>
</div>
</div>
</div>
</main>
<!-- Footer Action Bar -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex gap-4 px-4 py-4 bg-surface shadow-[0_-4px_12px_0_rgba(0,0,0,0.04)] rounded-t-xl">
<button class="flex-1 flex items-center justify-center text-on-surface-variant border border-outline-variant rounded-xl px-6 py-3 font-label-lg text-label-lg active:scale-[0.98] transition-all duration-200 hover:bg-surface-container-high">
            Cancelar
        </button>
<button class="flex-[2] flex items-center justify-center bg-primary text-on-primary rounded-xl px-6 py-3 font-label-lg text-label-lg active:scale-[0.98] transition-all duration-200 hover:opacity-90">
            Enviar Solicitação
        </button>
</footer>
<script>
        // Micro-interaction for toggle
        const toggle = document.getElementById('evidence-toggle');
        const uploadArea = document.getElementById('photo-upload-area');

        toggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                uploadArea.classList.remove('hidden');
                uploadArea.classList.add('flex');
            } else {
                uploadArea.classList.add('hidden');
                uploadArea.classList.remove('flex');
            }
        });

        // Atmospheric effect: Soft ripple on buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', function(e) {
                const x = e.clientX - e.target.offsetLeft;
                const y = e.clientY - e.target.offsetTop;
                
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.background = 'rgba(255, 255, 255, 0.3)';
                ripple.style.borderRadius = '50%';
                ripple.style.transform = 'scale(0)';
                ripple.style.transition = 'transform 0.4s ease-out, opacity 0.4s ease-out';
                ripple.style.pointerEvents = 'none';
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.style.transform = 'scale(10)';
                    ripple.style.opacity = '0';
                }, 10);
                
                setTimeout(() => ripple.remove(), 500);
            });
        });
    </script>
</body></html>
