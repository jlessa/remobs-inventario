<style>

<body class="bg-background text-on-surface font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-surface shadow-[0px_4px_12px_rgba(0,0,0,0.04)] flex items-center h-16 px-margin-mobile">
<button class="mr-4 text-on-surface-variant active:scale-95 transition-transform material-symbols-outlined">
            arrow_back
        </button>
<h1 class="font-title-lg text-title-lg text-on-surface flex-1">Adicionar Item</h1>
<div class="w-10"></div> <!-- Spacer for centering title if needed -->
</header>
<main class="flex flex-col min-h-[calc(100vh-64px)] pb-32">
<div class="px-margin-mobile pt-lg space-y-lg">
<!-- Type Selector (Segmented Control) -->
<div class="bg-surface-container-low p-1 rounded-xl flex items-center w-full">
<button class="flex-1 py-3 px-4 rounded-lg font-label-lg text-label-lg transition-all active-toggle" id="toggle-consumable" onclick="toggleType('consumable')">
                    Consumível
                </button>
<button class="flex-1 py-3 px-4 rounded-lg font-label-lg text-label-lg transition-all text-on-surface-variant" id="toggle-permanent" onclick="toggleType('permanent')">
                    Permanente
                </button>
</div>
<!-- Form Content -->
<div class="space-y-md">
<!-- Nome do Item -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1">Nome do Item</label>
<input class="w-full h-14 px-4 bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 rounded-xl font-body-lg text-body-lg text-on-surface transition-colors placeholder:text-outline" placeholder="Ex: Martelo Perfurador" type="text"/>
</div>
<!-- Brand and Model Grid -->
<div class="grid grid-cols-2 gap-gutter">
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1">Marca</label>
<input class="w-full h-14 px-4 bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 rounded-xl font-body-lg text-body-lg text-on-surface transition-colors placeholder:text-outline" placeholder="Ex: Bosch" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1">Modelo</label>
<input class="w-full h-14 px-4 bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 rounded-xl font-body-lg text-body-lg text-on-surface transition-colors placeholder:text-outline" placeholder="Ex: GBH 2-20 D" type="text"/>
</div>
</div>
<!-- Unit and Quantity Grid -->
<div class="grid grid-cols-2 gap-gutter">
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1">Unidade</label>
<div class="relative">
<select class="appearance-none w-full h-14 px-4 bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 rounded-xl font-body-lg text-body-lg text-on-surface transition-colors">
<option>Unidade (un)</option>
<option>Kilograma (kg)</option>
<option>Litro (l)</option>
<option>Metro (m)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1">Quantidade</label>
<input class="w-full h-14 px-4 bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 rounded-xl font-body-lg text-body-lg text-on-surface transition-colors placeholder:text-outline" placeholder="0" type="number"/>
</div>
</div>
<!-- Localização -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1">Localização</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">location_on</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border border-transparent focus:border-primary focus:ring-0 rounded-xl font-body-lg text-body-lg text-on-surface transition-colors placeholder:text-outline" placeholder="Ex: Corredor A, Prateleira 4" type="text"/>
</div>
</div>

<label class="font-label-lg text-label-lg text-on-surface-variant ml-1">Anexar Foto ou Nota Fiscal</label>

<div class="w-full py-xl px-md border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-lowest flex flex-col items-center justify-center text-center space-y-sm transition-colors group-hover:bg-surface-container-low">
<div class="w-12 h-12 bg-primary-container/10 rounded-full flex items-center justify-center text-primary">

</div>
<div class="space-y-1">

</div>
</div>
</div>
</div>
</div>

<span>Salvar Item</span>
</button>
</footer>
<!-- Bottom Navigation Mockup (Suppressed as per rules for Transactional screen, but keeping space logic) -->
<script>
        function toggleType(type) {
            const consumableBtn = document.getElementById('toggle-consumable');
            const permanentBtn = document.getElementById('toggle-permanent');
            
            if (type === 'consumable') {
                consumableBtn.classList.add('active-toggle');
                consumableBtn.classList.remove('text-on-surface-variant');
                permanentBtn.classList.remove('active-toggle');
                permanentBtn.classList.add('text-on-surface-variant');
            } else {
                permanentBtn.classList.add('active-toggle');
                permanentBtn.classList.remove('text-on-surface-variant');
                consumableBtn.classList.remove('active-toggle');
                consumableBtn.classList.add('text-on-surface-variant');
            }
        }

        // Ripple Effect logic (Visual enhancement)
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.width = '1px';
                ripple.style.height = '1px';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = 'rgba(255, 255, 255, 0.3)';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.style.transform = 'scale(0)';
                ripple.style.transition = 'transform 0.4s ease-out, opacity 0.4s ease-out';
                
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.style.transform = 'scale(300)';
                    ripple.style.opacity = '0';
                }, 0);
                
                setTimeout(() => {
                    ripple.remove();
                }, 400);
            });
        });
    </script>
