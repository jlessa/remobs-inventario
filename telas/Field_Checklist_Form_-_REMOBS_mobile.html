<script>
        // Simple micro-interaction for the radio buttons
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.querySelectorAll('input[name="'+e.target.name+'"]').forEach(r => {
                    r.closest('label').classList.remove('border-primary', 'bg-primary/5');
                    r.closest('label').classList.add('border-outline-variant');
                });
                if(e.target.checked) {
                    e.target.closest('label').classList.add('border-primary', 'bg-primary/5');
                    e.target.closest('label').classList.remove('border-outline-variant');
                }
            });
        });

        // Initialize state for checked radios
        document.querySelectorAll('input[type="radio"]:checked').forEach(r => {
            r.closest('label').classList.add('border-primary', 'bg-primary/5');
            r.closest('label').classList.remove('border-outline-variant');
        });
    </script>
