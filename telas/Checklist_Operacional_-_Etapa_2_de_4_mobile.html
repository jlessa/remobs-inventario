<body class="min-h-screen flex flex-col font-body-md text-body-md">

<div class="w-8 h-8 rounded-full step-inactive flex items-center justify-center text-sm font-bold">
                        3

<!-- Step 4 (Pending) -->

<div class="w-8 h-8 rounded-full step-inactive flex items-center justify-center text-sm font-bold">

<!-- Section: Inspeção de Rotina -->

</div>

<div class="flex items-start gap-md">
<input class="mt-1 w-5 h-5 rounded border-outline text-primary focus:ring-primary" type="checkbox"/>
<div class="flex flex-col gap-1">
<span class="font-label-lg text-label-lg text-on-surface leading-tight">Verificar integridade física do casco</span>
<div class="flex items-center gap-1.5 px-2 py-0.5 bg-surface-container rounded-full w-fit">
<span class="w-2 h-2 rounded-full bg-outline"></span>
<span class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">Pendente</span>
</div>
</div>
</div>
</div>
</label>
<!-- Item 2 -->
<label class="block bg-surface-container-lowest border border-transparent rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.04)] active:scale-[0.98] transition-all cursor-pointer">

<div class="flex items-start gap-md">

</div>
</div>
</div>
</div>

<div class="flex items-start justify-between gap-md">
<div class="flex items-start gap-md">
<input class="mt-1 w-5 h-5 rounded border-outline text-primary focus:ring-primary" type="checkbox"/>
<div class="flex flex-col gap-1">

<!-- Footer Controls -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-container-lowest p-margin-mobile flex flex-col gap-sm shadow-[0_-8px_24px_rgba(0,0,0,0.06)] z-50">
<button class="w-full bg-primary text-on-primary font-label-lg py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform">
            Próxima Etapa
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full bg-transparent text-primary font-label-lg py-3 rounded-xl flex items-center justify-center gap-2 border border-primary active:bg-primary-container/10 transition-all">
            Salvar Rascunho
        </button>
</footer>
<script>
        // Micro-interactions for the checklist items
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const badge = this.closest('label').querySelector('.bg-surface-container');
                const badgeDot = badge.querySelector('.rounded-full');
                const badgeText = badge.querySelector('span:last-child');
                
                if (this.checked) {
                    badge.classList.remove('bg-surface-container');
                    badge.classList.add('bg-secondary-container');
                    badgeDot.classList.remove('bg-outline');
                    badgeDot.classList.add('bg-secondary');
                    badgeText.textContent = 'Concluído';
                    badgeText.classList.remove('text-on-surface-variant');
                    badgeText.classList.add('text-on-secondary-container');
                    this.closest('label').classList.add('ring-2', 'ring-secondary/20');
                } else {
                    badge.classList.add('bg-surface-container');
                    badge.classList.remove('bg-secondary-container');
                    badgeDot.classList.add('bg-outline');
                    badgeDot.classList.remove('bg-secondary');
                    badgeText.textContent = 'Pendente';
                    badgeText.classList.add('text-on-surface-variant');
                    badgeText.classList.remove('text-on-secondary-container');
                    this.closest('label').classList.remove('ring-2', 'ring-secondary/20');
                }
            });
        });
    </script>
