<div class="w-full max-w-md bg-surface-container border border-outline-variant/10 rounded-lg shadow-xl p-md flex flex-col gap-md">
<!-- Title Section -->
<div class="space-y-base text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Login</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Bem-vindo de volta!</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-sm" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors group-focus-within:text-primary" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-low border-1.5 border-outline-variant rounded-lg py-sm pl-12 pr-sm text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="email" placeholder="nome@exemplo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Senha</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors group-focus-within:text-primary" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border-1.5 border-outline-variant rounded-lg py-sm pl-12 pr-12 text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Esqueceu a senha?</a>
</div>
<!-- Submit Button -->
<button class="btn-gradient mt-sm w-full py-sm rounded-lg text-on-primary-container font-headline-sm text-headline-sm shadow-lg hover:opacity-90 active:scale-95 transition-all duration-200" type="submit">
                    Entrar
                </button>
</form>
<!-- Social Login / Divider -->
<div class="relative flex items-center py-xs">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="flex-shrink mx-sm text-label-md text-outline">OU</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<!-- Register Footer -->
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Ainda não tem conta? 
                    <a class="text-primary font-bold hover:underline" href="#">Cadastre-se</a>
</p>
</div>
</div>
</main>
<!-- Bottom Margin for Mobile Visual Balance (Since Nav is suppressed) -->
<div class="h-sm"></div>
<script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const eye = document.getElementById('eye-icon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                eye.textContent = 'visibility_off';
            } else {
                pwd.type = 'password';
                eye.textContent = 'visibility';
            }
        }

        // Ripple/Active State micro-interaction for button
        const btn = document.querySelector('.btn-gradient');
        btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
        btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
        btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
    </script>
</body></html>
